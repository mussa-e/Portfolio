<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/Logo icon.svg">
    <title>Portfolio</title>
</head>
<body>
    <section class="top">

            <img class="bg-shape" src="img/BG shape.svg">
        </div>

        <div class="potrait">
            <img src="img/potrait-grundriss.png">
        </div>

        <div class="top-right">

            <div class="top-right-logo-wrapper">
                <div class="top-right-logo">
                    <img src="img/Logo icon.svg">
                </div>
                <div class="top-right-under-logo">
                    <p class="top-right-under-logo-name">M.Faragi</p>
                    <p class="top-right-under-logo-property">developer</p>
                </div>
            </div>

                <div class="top-right-middle">
                    <p class="top-right-middle-name">Mussa Faragi</p>
                    <p class="top-right-middle-property">Frontend Developer</p>
                </div>

                <div class="arrow-down">
                    <img src="img/Arrow down.svg">
                </div>
            
                <div class="top-links">
                    <div class="top-links-img-wrapper">
                        <img src="img/Email button.svg">
                    </div>

                    <div class="top-links-img-wrapper">
                        <img src="img/Github button.svg">
                    </div>

                    <div class="top-links-img-wrapper">
                        <img src="img/Linkedin button.svg">
                    </div>
                </div>

        </div>

    </section>

    <section class="bar">
        
    </section>
